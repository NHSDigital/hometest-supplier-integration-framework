---
repos:
  # https://github.com/pre-commit/pre-commit-hooks/releases
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master, --branch, develop]


  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: yamllint
        description: This hook runs yamllint.
        entry: yamllint
        language: python
        types: [file, yaml]
        files: \.(yml|yaml)$

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--fix]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  - repo: https://github.com/crate-ci/typos
    rev: v1.47.2
    hooks:
      - id: typos

  # - repo: https://github.com/pre-commit/mirrors-prettier
  #   rev: v4.0.0-alpha.8
  #   hooks:
  #     - id: prettier
  #       types_or: [javascript, json]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, refactor, test, ci, build]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-jsonschema
        name: Validate FHIR examples
        files: ^examples/fhir/.*\.json$
        args: ["--schemafile", "schemas/fhir-schemas/Bundle.json"]


  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks detect --no-git --redact --verbose --config=scripts/config/gitleaks.toml
        language: system
        pass_filenames: false

      # - id: syft-sbom
      #   name: Syft SBOM generation
      #   entry: syft scan dir:. --output spdx-json=sbom.spdx.json --output cyclonedx-json=sbom.cdx.json
      #   language: system
      #   pass_filenames: false
      #   always_run: true
      #   stages: [pre-push]

      # - id: grype-vuln-scan
      #   name: Grype vulnerability scan
      #   entry: grype sbom:sbom.cdx.json --fail-on high --only-fixed
      #   language: system
      #   pass_filenames: false
      #   always_run: true
      #   stages: [pre-push]

      - id: spectral-lint
        name: Spectral OpenAPI lint
        entry: spectral lint --ruleset tests/spectral/.spectral.yaml
        language: system
        files: schemas/.*\.(yaml|yml)$
        pass_filenames: true

      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        entry: pwsh -Command "Invoke-ScriptAnalyzer -Path $args -Severity Warning -EnableExit"
        language: system
        files: \.ps1$
        pass_filenames: true
