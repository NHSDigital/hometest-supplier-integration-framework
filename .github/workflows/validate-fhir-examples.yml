name: Validate FHIR Examples

on:
  push:
    paths:
      - 'examples/fhir/**'
      - 'tests/schema/fhir-validator.sh'
      - '.github/scripts/generate-validation-comment.js'
      - '.github/workflows/validate-fhir-examples.yml'
  pull_request:
    paths:
      - 'examples/fhir/**'
      - 'tests/schema/fhir-validator.sh'
      - '.github/scripts/generate-validation-comment.js'
      - '.github/workflows/validate-fhir-examples.yml'
  workflow_dispatch:
    inputs:
      fhir_version:
        description: 'FHIR version to validate against'
        required: false
        default: '4.0'

jobs:
  validate:
    name: Validate FHIR examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set CI variables
        id: vars
        run: |
          echo "fhir_version=${{ inputs.fhir_version || '4.0' }}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Download FHIR validator JAR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p validator
          gh release download \
            --pattern '*.jar' \
            --repo 'hapifhir/org.hl7.fhir.core' \
            --dir validator
          echo "JAR=$(ls validator/*.jar | head -1)" >> "$GITHUB_ENV"

      - name: Run FHIR validation (FHIR R${{ steps.vars.outputs.fhir_version }})
        id: validate
        continue-on-error: true
        run: |
          tests/schema/fhir-validator.sh \
            -j "$JAR" \
            -i examples/fhir \
            -o validation-results \
            -v "${{ steps.vars.outputs.fhir_version }}"

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fhir-validation-results
          path: validation-results/
          if-no-files-found: warn

  report:
    name: Post validation report
    runs-on: ubuntu-latest
    needs: validate
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download validation results
        uses: actions/download-artifact@v8.0.1
        with:
          name: fhir-validation-results
          path: validation-results/

      - name: Set up Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Generate comment body
        env:
          RESULTS_PATH: validation-results/results.json
          VALIDATION_OUTCOME: ${{ needs.validate.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node .github/scripts/generate-validation-comment.js

      - name: Find existing validation comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '<!-- fhir-validation -->'

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment-body.md
          edit-mode: replace
