---
name: "CI/CD pull request"

on:
  push:
    branches:
      - "main"
  pull_request:
    types: [opened, reopened, edited, synchronize]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Restore cache pre-commit hooks
        id: cache-pre-commit
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install mise
        shell: bash
        run: |
          echo "::group::Configure git"
          git config --global --add safe.directory '*'
          echo "::endgroup::"

          echo "::group::Install pre-commit hooks"
          curl https://mise.run | sh
          echo "$HOME/.local/share/mise/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
          echo "::endgroup::"

      - name: Install pre-commit
        shell: bash
        run: |
          echo "::group::Install pre-commit hooks"
          mise exec -- pre-commit install --install-hooks
          echo "::endgroup::"

      - name: Run pre-commit
        shell: bash
        run: |
          echo "::group::Run pre-commit checks"
          SKIP=no-commit-to-branch mise exec -- pre-commit run --all-files --show-diff-on-failure --color=always
        env:
          PRE_COMMIT_COLOR: always

      - name: "Save cache pre-commit hooks"
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
